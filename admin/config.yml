backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "content"
    label: "Website Content"
    files:
      - label: "Subjects List"
        name: "subjects"
        file: "data/subjects.json"
        fields:
          - label: "Subjects"
            name: "subjects"
            widget: "list"
            fields:
              - {label: "Subject Name", name: "title", widget: "string"}
              - {label: "Icon (Emoji)", name: "icon", widget: "string"}
              - {label: "Description", name: "description", widget: "string"}
              
